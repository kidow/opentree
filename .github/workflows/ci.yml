name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/opentree-core -> target

      - name: cargo test (opentree-core)
        working-directory: crates/opentree-core
        run: cargo test --all-features

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: apps/desktop/package.json

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm install --package-lock=false

      - name: Type check (tsc --noEmit)
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Vitest (UI unit tests)
        working-directory: apps/desktop
        run: npm test

      - name: Typecheck E2E config
        working-directory: apps/desktop
        run: npm run e2e:typecheck

  e2e:
    name: E2E (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: apps/desktop/package.json

      - name: Install Linux Tauri + webdriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm install --package-lock=false

      - name: Run E2E specs under Xvfb
        working-directory: apps/desktop
        run: xvfb-run --auto-servernum npm run e2e
